# Alembic configuration
# sqlalchemy.url is intentionally absent — the URL is read from the
# RIVERBANK_DB__DSN environment variable (or config.toml) in env.py.

[alembic]
script_location = src/riverbank/catalog/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
path_separator = os
truncate_slug_length = 40
revision_environment = false
sourceless = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
