# 50-article PoC benchmark dataset for Wikidata evaluation (Phase 1)
#
# Stratified across 5 domains (10 articles each).
# CI uses --sample 10 to keep under 10 minutes.
# Full 1,000-article dataset: eval/wikidata-benchmark-1k.yaml
#
# Usage:
#   riverbank evaluate-wikidata --dataset examples/golden/wikidata-benchmark-poc.yaml \
#       --profile wikidata-eval-v1 --output eval/results/poc-run.json --sample 10

