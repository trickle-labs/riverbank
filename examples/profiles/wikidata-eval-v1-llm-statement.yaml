# Wikidata evaluation profile using LLM statement fragmenter
#
# This profile tests the new LLMStatementFragmenter which sends the entire document
# to the LLM once and asks it to split it into individual statements.
#
# Use this profile when running:
#   riverbank evaluate-wikidata --article "Marie Curie" --profile wikidata-eval-v1-llm-statement
#
# Compare results with the heading-based fragmenter to see how statement-level
# splitting differs from heading-based fragmentation.

name: "wikidata-eval-v1-llm-statement"
description: "Evaluation profile using LLM-based statement fragmenter"

run_mode_sequence: ["full"]

# Extractor: use instructor for structured extraction
extractor: "instructor"
model_provider: "ollama"
model_name: "llama3.2"

# Parser: plain Markdown from Wikipedia download pipeline
parser: "markdown"

# Fragment using LLM statement splitting — send whole document to LLM once
# and have it split into individual statements
fragmenter: "llm_statement"
llm_statement_fragmentation:
  max_doc_chars: 20000
  max_statements: 200

# Editorial policy gate — relaxed for evaluation (Wikipedia text is high quality)
ingest_gate:
  min_fragment_length: 50
  max_fragment_length: 8000
  check_language: true

# LLM extraction — permissive mode for maximum recall
extraction_strategy:
  mode: "permissive"
  confidence_routing:
    # Low-confidence triples go to <tentative> graph for post-evaluation analysis
    tentative_threshold: 0.40
    trusted_threshold: 0.70
  safety_cap: 100  # Max triples per fragment

# Preprocessing: disabled by default
preprocessing:
  enabled: false
  max_tokens_for_preprocessing: 4000

# Constrained decoding: enable Ollama's JSON schema grammar constraint
constrained_decoding: true

# Verification: disabled for speed
verification:
  enabled: false

# Evaluation-specific configuration
evaluation:
  wikidata_benchmark: true
  novel_discovery_sampling_rate: 0.10
  min_confidence_for_scoring: 0.30
