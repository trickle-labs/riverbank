---
# docs-policy-v1-llm-wholedoc — General-purpose single-document extraction
#
# GENERAL-PURPOSE profile combining intelligent schema discovery with open-vocabulary extraction.
# Extracts the entire document in one LLM call. Predicate inference (v0.18.0+) automatically
# discovers domain-relevant predicates before extraction, bridging exhaustive discovery with
# focused fact extraction.
#
# Extraction philosophy: PERMISSIVE + INTELLIGENT
#   - Predicate inference: LLM proposes domain-appropriate predicates (high confidence)
#   - Open vocabulary: proposed predicates + any other relevant predicates
#   - High extraction target (100-300 triples) encourages exhaustive fact extraction
#   - Low evidence bar (citation_floor: 0) accepts well-grounded inferences
#
# Speed:
#   - ~1-2 minutes for medium docs (< 50k chars)
#   - ~17x faster than fragmented extraction on same document
#
# Recommended next steps:
#   1. Run this profile on your corpus
#   2. Use 'riverbank induce-schema' to analyze predicate distribution
#   3. Create a domain-specific profile with allowed_predicates (see biography/scientific examples)
#   4. Compare extraction quality between permissive and constrained modes
#
# Usage:
#   riverbank ingest ~/.riverbank/article_cache/marie_curie.md \
#     --profile examples/profiles/docs-policy-v1-llm-wholedoc.yaml
#   riverbank ingest examples/markdown-corpus/ --profile examples/profiles/docs-policy-v1-llm-wholedoc.yaml
#
name: docs-policy-v1-llm-wholedoc
version: 1

# Extractor — "instructor" uses LLM via OpenAI API (or Ollama via base_url override)
extractor: instructor

model_provider: ollama
model_name: llama3.2
embed_model: nomic-embed-text
max_fragment_tokens: 2000

named_graph: "http://riverbank.example/graph/trusted"

prompt_text: |
  You are a knowledge graph compiler.  Extract factual claims from the
  following documentation as RDF triples.

  For each claim provide:
  - subject: prefixed IRI (e.g. ex:Marie_Curie)
  - predicate: prefixed IRI (e.g. ex:discovered, ex:collaborated_with)
  - object_value: prefixed IRI or literal string
  - confidence: float 0.0–1.0
  - evidence: exact character offsets and a verbatim excerpt

  IMPORTANT:
  - Do NOT extract Wikipedia metadata, infoboxes, categories, or templates
  - Only extract factual claims about entities, events, relationships, discoveriews
  - Ignore "See also", "References", "External links", "Notes" sections
  - Only extract claims directly supported by the text
  - Do NOT fabricate evidence
  - Do NOT wrap entity names or values in square brackets (e.g. "[Arne Slot]")
  - Object values must be clean strings: use ex:Entity_Name for entity IRIs, plain text for literals
  - No markdown formatting, no brackets, no special wrapping in object values

  ENTITY CANONICALISATION:
  - Use ONE consistent IRI for each real-world entity throughout the document.
    For example, always use ex:Liverpool_Football_Club for the football club,
    never ex:Liverpool, ex:Club, ex:The_Reds, or ex:LFC.
  - Choose the most precise and unambiguous form: prefer ex:Liverpool_Football_Club
    over ex:Liverpool (which could be the city).

  PREDICATE QUALITY:
  - Use simple, reusable predicates: ex:founded_in, ex:managed_by, ex:won_title.
  - Do NOT encode years, ordinals, or conditions inside predicate names.
    BAD:  ex:won_first_FA_Cup, ex:appointed_manager_in_1974
    GOOD: ex:won_trophy with object "FA Cup", and a separate ex:year "1974"
  - Do NOT extract statistical summary rows, infobox tables, or trophy lists
    as separate entities. Extract individual facts instead.
  - Use standard predicates for common relationships:
    ex:founded_in (year/place), ex:based_in (location), ex:managed_by (person),
    ex:affiliated_with (org), ex:plays_in (league/competition).
  - Do NOT use number words (one, two, six, etc.) as object IRIs.
    BAD:  ex:won_european_cups ex:Six
    GOOD: ex:won_european_cups "6" or ex:won_european_cups "six times"

editorial_policy:
  min_fragment_length: 50
  max_fragment_length: 500000  # Very high to keep entire document as one fragment
  min_heading_depth: 0
  confidence_threshold: 0.0     # PERMISSIVE: accept all confidence levels (no editorial gate)
  allowed_languages:
    - en

# Fragmenter: noop (aliased to direct in v0.15.1+) — treats entire document as single fragment
fragmenter: noop
direct_extraction:
  max_doc_chars: 500000  # match max_fragment_length above

extraction_strategy:
  # Extraction target: PERMISSIVE mode — ask LLM for high volume of triples
  # The model will naturally produce 50-100 triples; with min_triples: 100,
  # we encourage exhaustive extraction. num_predict is auto-scaled to accommodate.
  extraction_target:
    min_triples: 40        # Realistic for constrained extraction
    max_triples: 100       # Fewer, higher-quality triples
  citation_floor: 0        # PERMISSIVE: accept all triples regardless of excerpt

# Note: constrained_decoding disabled — MD_JSON mode is more reliable with Ollama
# constrained_decoding: true

# v0.18.0: Predicate inference — LLM-driven schema discovery
# Automatically discover domain-appropriate predicates before extraction.
# The LLM first analyzes the document to propose relevant predicates,
# then uses those proposals to focus extraction on high-confidence facts.
#
# This bridges permissive (exhaustive discovery) and constrained (focused extraction):
# - First pass: LLM proposes predicates based on document content
# - Second pass: extraction uses proposed predicates + raw vocabulary
# - Result: natural vocabulary tailored to the document domain
predicate_inference:
  enabled: true
  confidence_threshold: "high"
  use_for_extraction: true   # Constrain extraction to discovered predicates — reduces sprawl
  max_predicates: 40

# Extraction target: reduced to realistic volume for constrained extraction
# With predicate constraints, 40-60 high-quality triples beats 200 noisy ones.

# Competency questions — SPARQL ASK queries that the compiled graph must answer.
# Used by the golden corpus CI gate (tests/golden/).
competency_questions:
  - id: cq-01
    description: "The corpus defines a concept called 'Confidence'"
    sparql: |
      ASK {
        ?s ?p "Confidence" .
      }
  - id: cq-02
    description: "The corpus mentions evidence spans with character offsets"
    sparql: |
      ASK {
        ?s ?p ?o .
        FILTER(CONTAINS(STR(?o), "character"))
      }
  - id: cq-03
    description: "The corpus contains at least one subject–predicate–object triple"
    sparql: |
      ASK {
        ?s ?p ?o .
      }

distillation:
  enabled: true
  strategy: moderate

# v0.16.0: Entity resolution — after extraction, ask the LLM to identify which
# subject IRIs refer to the same real-world entity and emit owl:sameAs links.
# The vocabulary normalisation pass then rewrites all aliases to the canonical URI.
entity_resolution:
  enabled: true
  backend: "llm"              # llm: one call per doc; embeddings: cosine-similarity only
  max_entities_per_call: 50
  confidence_threshold: 0.75

# v0.15.3: Vocabulary normalisation — post-extraction pass
# DISABLED in this permissive profile: vocabulary normalisation (predicate collapse,
# categorical promotion) is better suited for constrained/domain-specific extraction.
# For general-purpose open-vocabulary extraction, it can be too aggressive.
# To enable, set enabled: true and tune collapse_predicates/categorical_threshold.
vocabulary_normalisation:
  enabled: false

# Preprocessing: now free with NLP backend (sumy + spaCy NER)
# Injects domain summary + entity catalog to guide extraction
preprocessing:
  enabled: true
  backend: "nlp"  # Uses sumy LexRank + spaCy NER (no LLM cost)
  max_tokens_for_preprocessing: 4000

# Verification: now free with NLI backend (cross-encoder)
# Filters out hallucinated/contradictory triples against source
verification:
  enabled: false
  backend: "nli"  # Uses cross-encoder/nli-distilroberta-base (no LLM cost)

# Vocabulary: PERMISSIVE with intelligent constraints
# allowed_predicates is empty, so the LLM can propose any predicates.
# Predicate inference (above) provides intelligent guidance by proposing high-confidence
# domain-appropriate predicates before extraction. These are merged into allowed_predicates
# for the extraction pass, steering the LLM toward high-quality facts while remaining open.
#
# To switch to FULLY CONSTRAINED mode, populate this list with domain-specific predicates
# and disable predicate_inference. See examples/profiles/docs-policy-v1-llm-biography.yaml.
#
# To analyze the natural vocabulary the model produces, use:
#   riverbank induce-schema --graph http://riverbank.example/graph/trusted --output schema.ttl
allowed_predicates: []
