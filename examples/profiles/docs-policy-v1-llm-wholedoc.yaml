---
# docs-policy-v1-llm-wholedoc — General-purpose single-document extraction
#
# GENERAL-PURPOSE profile combining intelligent schema discovery with open-vocabulary extraction.
# Extracts the entire document in one LLM call. Predicate inference (v0.18.0+) automatically
# discovers domain-relevant predicates before extraction, bridging exhaustive discovery with
# focused fact extraction.
#
# Extraction philosophy: PERMISSIVE + INTELLIGENT
#   - Predicate inference: LLM proposes domain-appropriate predicates (high confidence)
#   - Open vocabulary: proposed predicates + any other relevant predicates
#   - High extraction target (100-300 triples) encourages exhaustive fact extraction
#   - Low evidence bar (citation_floor: 0) accepts well-grounded inferences
#
# Speed:
#   - ~1-2 minutes for medium docs (< 50k chars)
#   - ~17x faster than fragmented extraction on same document
#
# Recommended next steps:
#   1. Run this profile on your corpus
#   2. Use 'riverbank induce-schema' to analyze predicate distribution
#   3. Create a domain-specific profile with allowed_predicates (see biography/scientific examples)
#   4. Compare extraction quality between permissive and constrained modes
#
# Usage:
#   riverbank ingest ~/.riverbank/article_cache/marie_curie.md \
#     --profile examples/profiles/docs-policy-v1-llm-wholedoc.yaml
#   riverbank ingest examples/markdown-corpus/ --profile examples/profiles/docs-policy-v1-llm-wholedoc.yaml
#
name: docs-policy-v1-llm-wholedoc
version: 1

# ============================================================================
# LLM MODEL CONFIGURATION
# ============================================================================

# Extractor: "instructor" uses LLM structured output via OpenAI API or Ollama
# Alternatives: "noop" (no extraction, testing only)
extractor: instructor

# LLM Provider and model selection
model_provider: ollama              # ollama, openai, azure, anthropic, or local
model_name: llama3.2                # LLM model name (e.g., gpt-4, claude-3-sonnet)
embed_model: nomic-embed-text       # Embedding model for entity resolution, similarity matching
max_fragment_tokens: 2000           # Max tokens per fragment (used with semantic fragmenter)

# Named graph IRI where triples will be written by default
named_graph: "http://riverbank.example/graph/trusted"

# ============================================================================
# EXTRACTION PROMPT
# ============================================================================
# Instructs the LLM on what to extract, how to format it, and quality rules.
# This prompt is injected into every extraction call.
#
prompt_text: |
  You are a knowledge graph compiler.  Extract factual claims from the
  following documentation as RDF triples.

  For each claim provide:
  - subject: prefixed IRI (e.g. ex:Marie_Curie)
  - predicate: prefixed IRI (e.g. ex:discovered, ex:collaborated_with)
  - object_value: prefixed IRI or literal string
  - confidence: float 0.0–1.0
  - evidence: exact character offsets and a verbatim excerpt

  IMPORTANT:
  - Do NOT extract Wikipedia metadata, infoboxes, categories, or templates
  - Only extract factual claims about entities, events, relationships, discoveriews
  - Ignore "See also", "References", "External links", "Notes" sections
  - Only extract claims directly supported by the text
  - Do NOT fabricate evidence
  - Do NOT wrap entity names or values in square brackets (e.g. "[Arne Slot]")
  - Object values must be clean strings: use ex:Entity_Name for entity IRIs, plain text for literals
  - No markdown formatting, no brackets, no special wrapping in object values

  ENTITY CANONICALISATION:
  - Use ONE consistent IRI for each real-world entity throughout the document.
    For example, always use ex:Liverpool_Football_Club for the football club,
    never ex:Liverpool, ex:Club, ex:The_Reds, or ex:LFC.
  - Choose the most precise and unambiguous form: prefer ex:Liverpool_Football_Club
    over ex:Liverpool (which could be the city).

  PREDICATE QUALITY:
  - Use simple, reusable predicates: ex:founded_in, ex:managed_by, ex:won_title.
  - Do NOT encode years, ordinals, or conditions inside predicate names.
    BAD:  ex:won_first_FA_Cup, ex:appointed_manager_in_1974
    GOOD: ex:won_trophy with object "FA Cup", and a separate ex:year "1974"
  - Do NOT extract statistical summary rows, infobox tables, or trophy lists
    as separate entities. Extract individual facts instead.
  - Use standard predicates for common relationships:
    ex:founded_in (year/place), ex:based_in (location), ex:managed_by (person),
    ex:affiliated_with (org), ex:plays_in (league/competition).
  - Do NOT use number words (one, two, six, etc.) as object IRIs.
    BAD:  ex:won_european_cups ex:Six
    GOOD: ex:won_european_cups "6" or ex:won_european_cups "six times"

# ============================================================================
# EDITORIAL POLICY
# ============================================================================
# Controls fragmentation, filtering, and acceptance criteria for extraction.
#
editorial_policy:
  min_fragment_length: 50           # Minimum characters per fragment (skip tiny sections)
  max_fragment_length: 500000       # Very high to keep entire document as one fragment
                                    # (whole-document extraction = 1 LLM call)
  min_heading_depth: 0              # Include all headings (depth 0 = top-level)
  confidence_threshold: 0.0         # PERMISSIVE: accept ALL confidence levels
                                    # (no editorial gate filtering triples)
  allowed_languages:
    - en                            # Only process English documents

# ============================================================================
# FRAGMENTER
# ============================================================================
# Determines how to split documents into extraction units.
# "noop" (aliased to "direct") treats the entire document as one fragment.
#
fragmenter: noop                    # noop: whole-document mode (1 fragment)
                                    # heading: split at heading boundaries
                                    # semantic: clustering-based chunking
direct_extraction:
  max_doc_chars: 500000             # Max doc size for noop fragmenter (match max_fragment_length)

# ============================================================================
# EXTRACTION STRATEGY
# ============================================================================
# Controls how many triples to extract and evidence requirements.
#
extraction_strategy:
  # Extraction target: guidance for LLM on triple volume
  # PERMISSIVE mode: ask for high volume, accept all confidence levels
  # num_predict token budget is auto-scaled based on these targets.
  extraction_target:
    min_triples: 80                 # Minimum expected triples (LLM may undershoot)
    max_triples: 160                # Maximum expected triples (stop if reached)
  citation_floor: 0                 # PERMISSIVE: accept all triples
                                    # (any confidence, any excerpt quality)
                                    # Higher values filter by confidence in extraction

# Constrained decoding (optional): force LLM to output valid structured JSON
# Disabled: MD_JSON mode is more reliable with Ollama than constrained_decoding
# constrained_decoding: true

# ============================================================================
# PREDICATE INFERENCE (v0.18.0+)
# ============================================================================
# LLM-driven schema discovery: propose domain-appropriate predicates before extraction.
#
# Two-pass approach:
#   Pass 1: LLM analyzes document, proposes relevant predicates
#   Pass 2: Extraction uses proposed predicates + any other predicates
#
# Bridges permissive (exhaustive) and constrained (focused) extraction:
# - Discovers natural vocabulary tailored to document domain
# - Reduces predicate sprawl while remaining open-vocabulary
# - Improves confidence of extracted facts
#
# Confidence threshold strategy:
#   "high": Only very confident proposals (strict filtering, fewest predicates)
#   "medium": Balanced—likely + confident proposals (recommended for permissive, ~4-10 predicates)
#   "low": All proposals including speculative (should give most, but may be empty in some cases)
#
# For PERMISSIVE profile: use "medium" to get balanced discovery without excessive noise.
# If you need more predicates, try "low" or adjust max_predicates upward.
#
predicate_inference:
  enabled: true                     # Enable schema discovery
  confidence_threshold: "medium"    # medium: balanced discovery (recommended)
  use_for_extraction: true          # Merge proposals into allowed_predicates
                                    # (constrains extraction to discovered schema)
  max_predicates: 40                # Stop proposing after N predicates

# ============================================================================
# COMPETENCY QUESTIONS
# ============================================================================
# SPARQL queries that the compiled graph MUST satisfy.
# Used by the golden corpus CI gate (tests/golden/) to validate extraction.
#
competency_questions:
  - id: cq-01
    description: "The corpus defines a concept called 'Confidence'"
    sparql: |
      ASK {
        ?s ?p "Confidence" .
      }
  - id: cq-02
    description: "The corpus mentions evidence spans with character offsets"
    sparql: |
      ASK {
        ?s ?p ?o .
        FILTER(CONTAINS(STR(?o), "character"))
      }
  - id: cq-03
    description: "The corpus contains at least one subject–predicate–object triple"
    sparql: |
      ASK {
        ?s ?p ?o .
      }

# ============================================================================
# DOCUMENT DISTILLATION (v0.15.2+)
# ============================================================================
# Optional pre-extraction content selection: remove boilerplate, focus on key facts.
#
# Purpose: Reduces document to essential content before extraction, improving:
#   - Extraction quality (LLM sees less noise)
#   - Token efficiency (fewer tokens = lower cost)
#   - Latency (shorter context to process)
#
# How it works:
#   1. Run on first ingest (LLM call per document)
#   2. Result cached on disk by content hash + strategy
#   3. Subsequent ingests reuse cached distillation (zero cost)
#   4. Original content hash preserved, so source deduplication still works
#
# Strategies:
#   \"boilerplate_removal\": Deterministic heuristics (no LLM cost)
#   \"minimal\": Keep ~90% of content, remove only obvious noise
#   \"moderate\": Keep ~70% of content, remove sidebars/ads/metadata (recommended)
#   \"aggressive\": Keep ~50% of content, extract only main body
#   \"conservative\": Keep ~80% of content, very selective removal
#
# Trade-offs:
#   - Too aggressive: may lose important context, reduces triple coverage
#   - Too conservative: minimal speed gain, still large context for LLM
#   - Moderate: sweet spot for most documents
#
distillation:
  enabled: true                     # Enable pre-extraction content filtering
  strategy: moderate                # Keep ~70% (removes sidebars, metadata, ads)

# ============================================================================
# ENTITY RESOLUTION (v0.16.0+)
# ============================================================================
# Post-extraction pass: identify entity aliases and emit owl:sameAs links.
# Merges different IRIs referring to the same real-world entity.
#
# Backends:
#   "llm": One LLM call per document (semantic, intelligent)
#   "embeddings": Cosine similarity (fast, no LLM cost, may miss some aliases)
#
entity_resolution:
  enabled: true                     # Run entity resolution pass
  backend: "llm"                    # Use LLM for semantic alias detection
  max_entities_per_call: 50         # Batch size for LLM calls
  confidence_threshold: 0.75        # Minimum confidence for owl:sameAs assertions

# ============================================================================
# VOCABULARY NORMALISATION (v0.15.3+)
# ============================================================================
# Post-extraction pass: normalize predicates, promote literals, decompose stuffed facts.
# Four normalization steps:
#   1. Categorical promotion: repeated literals → IRI resources
#   2. Predicate collapse: similar predicates → canonical form
#   3. Fact decomposition: strip qualifiers from predicate names
#   4. URI canonicalization: merge aliases via owl:sameAs
#
# DISABLED in this profile: predicate collapse is too aggressive for open-vocabulary.
# Better suited for constrained/domain-specific extraction. Can be re-enabled with tuning.
#
vocabulary_normalisation:
  enabled: false                    # Disabled for permissive open-vocabulary profile
  categorical_threshold: 2          # Promote literal when it appears ≥N times with same predicate
  collapse_predicates: false        # DISABLED: may over-merge unrelated predicates
  predicate_collapse_backend: "deterministic" # deterministic: edit-distance (safer)
                                    # llm: semantic (more aggressive)
  decompose_stuffed_predicates: true           # Decompose predicates like won_first_FA_Cup
  rewrite_canonical_uris: true                 # Rewrite aliases using owl:sameAs
  vocabulary_namespace: "http://riverbank.example/vocab/"

# ============================================================================
# PREPROCESSING
# ============================================================================
# Pre-extraction enrichment: summarize document, catalog entities.
# Injects domain context and entity catalog into extraction prompt.
#
# Backends:
#   "nlp": sumy LexRank + spaCy NER (no LLM cost, fast)
#   "llm": LLM-based summarization (higher quality, higher cost)
#
preprocessing:
  enabled: true                     # Run preprocessing pass
  backend: "nlp"                    # Use NLP-based summarization (no LLM cost)
  max_tokens_for_preprocessing: 4000 # Summary token budget (avoid too-long summaries)

# ============================================================================
# VERIFICATION (OPTIONAL)
# ============================================================================
# Post-extraction hallucination detection: filter triples contradicting source.
# Uses NLI (Natural Language Inference) cross-encoder, no LLM cost.
# DISABLED by default: adds ~20% runtime cost for hallucination filtering.
#
verification:
  enabled: false                    # Disabled: adds overhead, marginal quality gain
  backend: "nli"                    # cross-encoder/nli-distilroberta-base (no LLM cost)

# ============================================================================
# ALLOWED PREDICATES (VOCABULARY CONSTRAINTS)
# ============================================================================
# PERMISSIVE MODE: empty list allows LLM to propose any predicate.
#
# Predicate inference (above) provides intelligent guidance:
#   1. LLM analyzes document and proposes domain-appropriate predicates
#   2. Proposals are merged into allowed_predicates for extraction
#   3. Result: focused extraction within discovered schema, not fully open
#
# To switch to FULLY CONSTRAINED mode:
#   1. Populate this list with domain-specific predicates
#   2. Disable predicate_inference (set enabled: false)
#   3. See examples/profiles/docs-policy-v1-llm-biography.yaml for an example
#
# To analyze the vocabulary your extraction naturally produces:
#   riverbank induce-schema --graph http://riverbank.example/graph/trusted --output schema.ttl
#
allowed_predicates: []              # Empty = PERMISSIVE (any predicate allowed)
