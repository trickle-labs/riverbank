---
# docs-policy-v1 — Example compiler profile for the examples/markdown-corpus
#
# This profile extracts factual triples from Markdown documentation using
# the instructor extractor with Ollama. Calls the local LLM to extract facts.
name: docs-policy-v1
version: 1

# Extractor — "instructor" to use LLM extraction via Ollama
extractor: instructor

model_provider: ollama
model_name: llama3.2
embed_model: nomic-embed-text
max_fragment_tokens: 2000

named_graph: "http://riverbank.example/graph/trusted"

prompt_text: |
  You are a knowledge graph compiler.  Extract factual claims from the
  following documentation section as RDF triples.

  For each claim provide:
  - subject: prefixed IRI (e.g. ex:Ariadne)
  - predicate: prefixed IRI (e.g. ex:createdBy)
  - object_value: prefixed IRI or literal
  - confidence: float 0.0–1.0
  - evidence: exact character offsets and a verbatim excerpt

  Only extract claims directly supported by the text.
  Do NOT fabricate evidence.

editorial_policy:
  min_fragment_length: 50
  max_fragment_length: 8000
  min_heading_depth: 0
  confidence_threshold: 0.7
  allowed_languages:
    - en

# Competency questions — SPARQL ASK queries that the compiled graph must answer.
# Used by the golden corpus CI gate (tests/golden/).
competency_questions:
  - id: cq-01
    description: "The corpus defines a concept called 'Confidence'"
    sparql: |
      ASK {
        ?s ?p "Confidence" .
      }
  - id: cq-02
    description: "The corpus mentions evidence spans with character offsets"
    sparql: |
      ASK {
        ?s ?p ?o .
        FILTER(CONTAINS(STR(?o), "character"))
      }
  - id: cq-03
    description: "The corpus contains at least one subject–predicate–object triple"
    sparql: |
      ASK {
        ?s ?p ?o .
      }
