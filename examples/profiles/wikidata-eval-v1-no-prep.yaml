# Wikidata evaluation profile for riverbank (without preprocessing)
#
# Use this profile for faster evaluation without document preprocessing:
#   riverbank evaluate-wikidata --article "Marie Curie" --profile wikidata-eval-v1-no-prep
#
# This profile configures the extractor for maximum precision and recall on
# encyclopaedic Wikipedia content, matching the types of facts Wikidata tracks.
# Preprocessing (document summarization) is disabled for speed and to avoid
# additional LLM calls.

name: "wikidata-eval-v1-no-prep"
description: "Evaluation profile for benchmarking riverbank against Wikidata ground truth (no preprocessing)"

run_mode_sequence: ["full"]

# Extractor: use instructor for structured extraction
extractor: "instructor"
model_provider: "ollama"
model_name: "llama3.2"

# Parser: plain Markdown from Wikipedia download pipeline
parser: "markdown"

# Fragment at headings to match Wikipedia's natural section structure
fragmenter: "heading"
fragmenter_config:
  min_heading_depth: 1
  max_heading_depth: 4

# Editorial policy gate — relaxed for evaluation (Wikipedia text is high quality)
ingest_gate:
  min_fragment_length: 50
  max_fragment_length: 8000
  check_language: true

# LLM extraction — permissive mode for maximum recall
extraction_strategy:
  mode: "permissive"
  confidence_routing:
    # Low-confidence triples go to <tentative> graph for post-evaluation analysis
    tentative_threshold: 0.40
    trusted_threshold: 0.70
  safety_cap: 100  # Max triples per fragment

# Preprocessing: disabled for this evaluation profile
preprocessing:
  enabled: false

# Constrained decoding: enable Ollama's JSON schema grammar constraint
# This forces valid JSON output at the token level, eliminating parse errors
constrained_decoding: true

# Verification: disabled for speed; enable with --verify flag
verification:
  enabled: false

# Evaluation-specific configuration
evaluation:
  wikidata_benchmark: true
  # Sample rate for manual novel-discovery annotation (Phase 2)
  novel_discovery_sampling_rate: 0.10
  # Minimum confidence to include a triple in scoring
  min_confidence_for_scoring: 0.30
