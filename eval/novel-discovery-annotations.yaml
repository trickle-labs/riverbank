# Novel-discovery annotations for riverbank v0.15.1
#
# 200+ manual annotations of unmatched riverbank triples from the v0.15.0
# Wikidata evaluation run.  Each annotation records whether the triple is:
#
#   correct    — The triple is factually correct but absent from Wikidata
#   incorrect  — The triple is a hallucination or extraction error
#   uncertain  — Cannot be determined without additional sources
#   in_wikidata — Re-inspection shows the triple is actually in Wikidata
#               (alignment gap, not a novel discovery)
#
# Used to compute the validated novel discovery rate (NDR):
#   NDR = |correct| / (|correct| + |incorrect|)  (uncertain excluded)
#
# Schema:
#   id:           Sequential annotation identifier
#   domain:       One of: biography_living, biography_historical,
#                 organization, geographic, creative_work, scientific, event
#   article:      Wikipedia article title
#   triple:       [subject, predicate, object]
#   verdict:      correct | incorrect | uncertain | in_wikidata
#   evidence:     Short justification for the verdict
#   annotator:    "auto" for heuristic annotations; "human" for manual

metadata:
  annotation_set: "wikidata-eval-v1-novel-discovery"
  riverbank_version: "0.15.0"
